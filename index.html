    <style>
      html {
        scroll-behavior: smooth;
        overflow-x: clip;
        scroll-padding-top: 6rem;
      }
      body {
        overflow-x: clip;
      }
      body {
        font-family: 'Inter', sans-serif;
        color: #1a1a1a;
        background-color: #ffffff;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      ::selection {
        background-color: #a7f3d0;
        color: #064e3b;
      }
      /* Visible keyboard focus (mouse clicks stay clean via :focus-visible) */
      :focus-visible {
        outline: 2px solid #10b981;
        outline-offset: 2px;
        border-radius: 4px;
      }
      /* Premium page scrollbar */
      body::-webkit-scrollbar {
        width: 11px;
      }
      body::-webkit-scrollbar-track {
        background: #ffffff;
      }
      body::-webkit-scrollbar-thumb {
        background-color: #d1d5db;
        border-radius: 10px;
        border: 3px solid #ffffff;
      }
      body::-webkit-scrollbar-thumb:hover {
        background-color: #10b981;
      }
      .custom-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scroll::-webkit-scrollbar-thumb {
        background-color: #e5e7eb;
        border-radius: 10px;
      }
      .industry-gradient {
        background: radial-gradient(circle at 10% 20%, rgba(216, 241, 230, 0.46) 0%, rgba(233, 226, 226, 0.28) 90.1%);
      }
      /* Shimmering sweep used on premium buttons */
      @keyframes btn-shimmer {
        100% { transform: translateX(100%); }
      }
      .shine-btn { position: relative; overflow: hidden; }
      .shine-btn::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 60%;
        height: 100%;
        background: linear-gradient(120deg, transparent, rgba(255,255,255,0.25), transparent);
        transform: translateX(-150%);
      }
      .shine-btn:hover::after {
        animation: btn-shimmer 0.9s ease;
      }
      /* Seamless marquee */
      @keyframes marquee {
        from { transform: translateX(0); }
        to { transform: translateX(-50%); }
      }
      .animate-marquee {
        animation: marquee 36s linear infinite;
      }
      .marquee-group:hover .animate-marquee {
        animation-play-state: paused;
      }
      .marquee-mask {
        -webkit-mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
        mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
      }
      /* Hero entrance + ambient motion */
      @keyframes hero-fade-up { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes hero-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
      @keyframes hero-grow { from { transform: scaleY(0); } to { transform: scaleY(1); } }
      .hero-fade-up { opacity: 0; animation: hero-fade-up 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
      .hero-float { animation: hero-float 6s ease-in-out infinite; }
      .hero-bar { transform-origin: bottom; animation: hero-grow 1s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
      /* Route transition (opacity-only so it never affects position:fixed descendants) */
      @keyframes page-enter { from { opacity: 0; } to { opacity: 1; } }
      .page-enter { animation: page-enter 0.35s ease-out; }
      @media (prefers-reduced-motion: reduce) {
        html { scroll-behavior: auto; }
        *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
      }
